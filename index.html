<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');
    </style>
    <link rel="stylesheet" href="indexstyle.css">
    <title>Simple Calculator</title>
</head>
<body>
    <div class="alert alert-warning alert-box" role="alert">
        A simple warning alert—check it out!
    </div>

    <div id="sibling-div">
        
    </div>

    <div id="Calculator">
        <h2>Calculator</h2>
        <div id="input-div">
            <input type="text" id="input-box">
        </div>
        <div id="buttons-div">
            <button class="btn">1</button><button class="btn">2</button><button class="btn">3</button><button class="btn">+</button>

            <button class="btn">4</button><button class="btn">5</button><button class="btn">6</button><button class="btn">-</button>

            <button class="btn">7</button><button class="btn">8</button><button class="btn">9</button><button class="btn">x</button>

            <button class="btn">0</button><button id="equalto">=</button><button class="btn" id="acbtn">AC</button><button class="btn">÷</button>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
